name: fluxodecaixa

services:
  postgres:
    image: postgres:16
    container_name: fluxodecaixa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-dados:/var/lib/postgresql/data
      - ./scripts/docker/postgres-init.sh:/docker-entrypoint-initdb.d/01-postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - fluxodecaixa

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fluxodecaixa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USUARIO:-fluxodecaixa}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_SENHA:-fluxodecaixa}
    ports:
      - "${RABBITMQ_PORT:-55672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-55673}:15672"
    volumes:
      - rabbitmq-dados:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - fluxodecaixa

  api-lancamentos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJETO: src/Lancamentos/Lancamentos.Api/Lancamentos.Api.csproj
        DLL_NAME: Lancamentos.Api.dll
    container_name: fluxodecaixa-api-lancamentos
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LancamentosDb: Host=postgres;Port=5432;Database=lancamentos_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Usuario: ${RABBITMQ_USUARIO:-fluxodecaixa}
      RabbitMq__Senha: ${RABBITMQ_SENHA:-fluxodecaixa}
      RabbitMq__VirtualHost: /
      Autenticacao__Issuer: ${Autenticacao__Issuer:-fluxodecaixa-local}
      Autenticacao__Audience: ${Autenticacao__Audience:-fluxodecaixa-clientes}
      Autenticacao__ChaveAssinatura: ${Autenticacao__ChaveAssinatura:-uma-chave-local-com-pelo-menos-32-bytes}
      Autenticacao__ExpiracaoEmMinutos: ${Autenticacao__ExpiracaoEmMinutos:-60}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${API_LANCAMENTOS_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - fluxodecaixa

  api-consolidado:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJETO: src/ConsolidadoDiario/ConsolidadoDiario.Api/ConsolidadoDiario.Api.csproj
        DLL_NAME: ConsolidadoDiario.Api.dll
    container_name: fluxodecaixa-api-consolidado
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ConsolidadoDiarioDb: Host=postgres;Port=5432;Database=consolidado_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Autenticacao__Issuer: ${Autenticacao__Issuer:-fluxodecaixa-local}
      Autenticacao__Audience: ${Autenticacao__Audience:-fluxodecaixa-clientes}
      Autenticacao__ChaveAssinatura: ${Autenticacao__ChaveAssinatura:-uma-chave-local-com-pelo-menos-32-bytes}
      Autenticacao__ExpiracaoEmMinutos: ${Autenticacao__ExpiracaoEmMinutos:-60}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_CONSOLIDADO_PORT:-8082}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - fluxodecaixa

  processador-consolidado:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJETO: src/ConsolidadoDiario/ConsolidadoDiario.Processador/ConsolidadoDiario.Processador.csproj
        DLL_NAME: ConsolidadoDiario.Processador.dll
    container_name: fluxodecaixa-processador-consolidado
    environment:
      ConnectionStrings__ConsolidadoDiarioDb: Host=postgres;Port=5432;Database=consolidado_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Usuario: ${RABBITMQ_USUARIO:-fluxodecaixa}
      RabbitMq__Senha: ${RABBITMQ_SENHA:-fluxodecaixa}
      RabbitMq__VirtualHost: /
    depends_on:
      rabbitmq:
        condition: service_healthy
      api-consolidado:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'ConsolidadoDiario.Processador.dll' > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fluxodecaixa

volumes:
  postgres-dados:
  rabbitmq-dados:

networks:
  fluxodecaixa:
    driver: bridge
